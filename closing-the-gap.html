<!doctype html>
<html lang="en">

<head>
  <title>Closing The Gap &middot; Purple Workshops</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="tailwind.css">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.usefathom.com/script.js" data-site="HDZTXTNE" defer></script>
  <script src="theme.js" defer></script>
</head>

<body class="mt-4 bg-white text-slate-800 dark:bg-slate-950 dark:text-slate-300 font-sans antialiased">

  <main class="mx-auto max-w-4xl px-6">

    <header class="border-t-[64px] border-brand pt-10 sm:pt-14">
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <h1 class="font-serif text-3xl sm:text-4xl font-bold text-slate-900 dark:text-white leading-tight order-2 sm:order-1">
          Closing The Gap
        </h1>
        <a href="/" class="shrink-0 self-end sm:self-auto order-1 sm:order-2">
          <img src="logo_big.png" alt="Purple Workshops" class="h-8 sm:h-9 w-auto">
        </a>
      </div>
      <p class="text-lg text-slate-600 dark:text-slate-400 mt-3">Presentation at Rocky Mountain Ruby, 2024</p>
    </header>

    <section class="mt-10">
      <div class="aspect-video w-full max-w-2xl">
        <iframe class="h-full w-full rounded-2xl border border-slate-200 dark:border-slate-700"
                src="https://slides.com/jeffcohen/from-bootcamp-to-job/embed?token=EVhwBNLL&style=light"
                title="From Bootcamp to Job"
                scrolling="no" frameborder="0"
                webkitallowfullscreen mozallowfullscreen allowfullscreen></iframe>
      </div>

      <div class="flex flex-wrap gap-x-6 gap-y-2 mt-8 text-brand-text dark:text-brand-soft font-semibold">
        <a href="/" class="hover:underline">Home</a>
        <a href="/workshops.html" class="hover:underline">Workshops</a>
      </div>
    </section>

    <footer class="border-t-[16px] border-brand mt-16 py-8 text-sm text-slate-500 dark:text-slate-400">
      <div class="flex items-center justify-between gap-4">
        <p>&copy; 2008&ndash;2026 Purple Workshops, LLC &middot; Chicago, IL</p>
        <button id="theme-toggle" type="button" aria-label="Toggle light and dark mode"
                class="inline-flex h-9 w-9 shrink-0 items-center justify-center rounded-lg border border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 transition hover:border-brand hover:text-brand-text dark:hover:text-brand-soft">
          <svg class="h-5 w-5 dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.7">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
          </svg>
          <svg class="h-5 w-5 hidden dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.7">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
          </svg>
        </button>
      </div>
    </footer>

  </main>

</body>

</html>
